name: Build Android APK

on:
  push:
    branches: ["main", "claude/**"]
    paths: ["app/**", ".github/workflows/build-apk.yml"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

      # SUPABASE_URL / SUPABASE_ANON_KEY come from repo secrets
      # (Settings -> Secrets and variables -> Actions). If unset, the APK
      # still builds but shows the "Supabase is not configured" screen.
      - run: >
          flutter build apk --release
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - uses: actions/upload-artifact@v4
        with:
          name: finance-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
