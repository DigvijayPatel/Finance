<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">

<title>Foundry — Humans Improving AI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f6f7f9;
  --surface: #ffffff;
  --surface-2: #fafbfc;
  --text: #1a1f27;
  --text-muted: #6b7280;
  --border: rgba(26, 31, 39, 0.16);
  --accent: #0d9488;
  --accent-soft: rgba(13, 148, 136, 0.08);
  --blue: #2563eb;
  --blue-soft: rgba(37, 99, 235, 0.08);
  --green: #16a34a;
  --green-soft: rgba(22, 163, 74, 0.1);
  --red: #dc2626;
  --red-soft: rgba(220, 38, 38, 0.1);
  --amber: #d97706;
  --amber-soft: rgba(217, 119, 6, 0.12);
  --purple: #7c3aed;
  --purple-soft: rgba(124, 58, 237, 0.08);
  --shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
  --chart-grid: rgba(26, 31, 39, 0.08);
}
html[data-theme="dark"] {
  --bg: #0e1116;
  --surface: #161b22;
  --surface-2: #1b212a;
  --text: #e6e9ee;
  --text-muted: #8b94a3;
  --border: rgba(230, 233, 238, 0.16);
  --accent: #2dd4bf;
  --accent-soft: rgba(45, 212, 191, 0.12);
  --blue: #5b8def;
  --blue-soft: rgba(91, 141, 239, 0.12);
  --green: #34c272;
  --green-soft: rgba(52, 194, 114, 0.12);
  --red: #f0635a;
  --red-soft: rgba(240, 99, 90, 0.12);
  --amber: #e8a33d;
  --amber-soft: rgba(232, 163, 61, 0.14);
  --purple: #a78bfa;
  --purple-soft: rgba(167, 139, 250, 0.12);
  --shadow: none;
  --chart-grid: rgba(230, 233, 238, 0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.45;
}
.container { max-width: 1180px; margin: 0 auto; padding: 16px; }
button { font: inherit; cursor: pointer; color: inherit; }
input, select, textarea { font: inherit; color: var(--text); background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; padding: 7px 10px; }
textarea { width: 100%; resize: vertical; }
a { color: var(--accent); }

header.topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand .logo { width: 34px; height: 34px; border-radius: 9px; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 17px; }
.brand h1 { font-size: 18px; letter-spacing: -0.2px; }
.brand .sub { font-size: 11.5px; color: var(--text-muted); }
.topbar-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

.btn { background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; padding: 7px 12px; font-size: 13px; box-shadow: var(--shadow); }
.btn:hover { border-color: var(--accent); }
.btn.primary { background: var(--accent); color: #fff; border-color: transparent; font-weight: 600; }
.btn.primary:hover { filter: brightness(1.07); }
.btn.danger { color: var(--red); }
.btn.small { padding: 4px 9px; font-size: 12px; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }

nav.tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 16px; border-bottom: 0.5px solid var(--border); padding-bottom: 0; }
nav.tabs button { background: none; border: none; padding: 9px 13px; font-size: 13.5px; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -0.5px; }
nav.tabs button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
nav.tabs button:hover { color: var(--text); }
nav.tabs .badge-dot { display: inline-block; min-width: 17px; padding: 1px 5px; border-radius: 9px; background: var(--accent-soft); color: var(--accent); font-size: 11px; font-weight: 700; margin-left: 4px; }

.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 16px; box-shadow: var(--shadow); }
.card h3 { font-size: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.grid { display: grid; gap: 12px; }
.grid.cols-2 { grid-template-columns: 1fr 1fr; }
.grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
@media (max-width: 900px) { .grid.cols-3, .grid.cols-4 { grid-template-columns: 1fr 1fr; } }
@media (max-width: 600px) { .grid.cols-2, .grid.cols-3, .grid.cols-4 { grid-template-columns: 1fr; } }

.stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px 16px; box-shadow: var(--shadow); }
.stat .label { font-size: 11.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
.stat .value { font-size: 22px; font-weight: 700; margin-top: 3px; letter-spacing: -0.4px; }
.stat .hint { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }

.pill { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 11.5px; font-weight: 600; }
.pill.green { background: var(--green-soft); color: var(--green); }
.pill.red { background: var(--red-soft); color: var(--red); }
.pill.amber { background: var(--amber-soft); color: var(--amber); }
.pill.blue { background: var(--blue-soft); color: var(--blue); }
.pill.purple { background: var(--purple-soft); color: var(--purple); }
.pill.accent { background: var(--accent-soft); color: var(--accent); }
.pill.muted { background: var(--surface-2); color: var(--text-muted); border: 0.5px solid var(--border); }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; font-size: 11.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; padding: 7px 10px; border-bottom: 0.5px solid var(--border); }
td { padding: 8px 10px; border-bottom: 0.5px solid var(--border); vertical-align: top; }
tr:last-child td { border-bottom: none; }
td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }

.list-item { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; padding: 11px 0; border-bottom: 0.5px solid var(--border); }
.list-item:last-child { border-bottom: none; }
.list-item .title { font-weight: 600; font-size: 13.5px; }
.list-item .meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

.domain-card { border: 0.5px solid var(--border); border-radius: 12px; padding: 14px; background: var(--surface); box-shadow: var(--shadow); }
.domain-card .dhead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.domain-card .dname { font-weight: 700; font-size: 13.5px; }
.tierbar { display: flex; gap: 4px; margin: 8px 0; }
.tierbar .seg { flex: 1; height: 6px; border-radius: 3px; background: var(--surface-2); border: 0.5px solid var(--border); }
.tierbar .seg.on { background: var(--accent); border-color: transparent; }

.ex-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 0.5px solid var(--border); }
.ex-row:last-child { border-bottom: none; }
.ex-row .xt { font-size: 13px; font-weight: 600; }
.ex-row .xm { font-size: 11.5px; color: var(--text-muted); }
.ex-row.locked { opacity: 0.5; }

.modal-backdrop { position: fixed; inset: 0; background: rgba(10,12,16,0.5); display: flex; align-items: flex-start; justify-content: center; padding: 30px 14px; z-index: 50; overflow-y: auto; }
.modal { background: var(--surface); border: 0.5px solid var(--border); border-radius: 14px; max-width: 680px; width: 100%; padding: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.25); }
.modal h2 { font-size: 16px; margin-bottom: 4px; }
.modal .msub { font-size: 12.5px; color: var(--text-muted); margin-bottom: 14px; }
.scenario { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 10px; padding: 12px 14px; font-size: 13.5px; margin-bottom: 14px; white-space: pre-wrap; }
.opt { display: block; width: 100%; text-align: left; background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 10px 13px; margin-bottom: 8px; font-size: 13.5px; }
.opt:hover { border-color: var(--accent); }
.opt.sel { border-color: var(--accent); background: var(--accent-soft); }
.opt.correct { border-color: var(--green); background: var(--green-soft); }
.opt.wrong { border-color: var(--red); background: var(--red-soft); }
.expl { border-left: 3px solid var(--accent); background: var(--accent-soft); border-radius: 0 10px 10px 0; padding: 10px 13px; font-size: 13px; margin-top: 12px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

.field { margin-bottom: 12px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
.field input, .field select { width: 100%; }
.strategy { display: flex; gap: 10px; align-items: flex-start; padding: 9px 11px; border: 0.5px solid var(--border); border-radius: 10px; margin-bottom: 7px; cursor: pointer; }
.strategy.sel { border-color: var(--accent); background: var(--accent-soft); }
.strategy .sname { font-weight: 600; font-size: 13px; }
.strategy .sdesc { font-size: 12px; color: var(--text-muted); }

.feed-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
.feed-item:last-child { border-bottom: none; }
.feed-item .ico { width: 26px; height: 26px; border-radius: 8px; background: var(--surface-2); border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.feed-item .ft { color: var(--text-muted); font-size: 11.5px; }

.bar-wrap { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 6px; height: 10px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--accent); border-radius: 6px; }

.muted { color: var(--text-muted); }
.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
.section-head { display: flex; justify-content: space-between; align-items: center; margin: 18px 0 10px; flex-wrap: wrap; gap: 8px; }
.section-head h2 { font-size: 16px; letter-spacing: -0.2px; }
.section-head .sub { font-size: 12.5px; color: var(--text-muted); }
.empty { text-align: center; color: var(--text-muted); padding: 26px 10px; font-size: 13px; }
.notice { border-left: 3px solid var(--amber); background: var(--amber-soft); border-radius: 0 10px 10px 0; padding: 10px 13px; font-size: 13px; margin-bottom: 12px; }
.chart-box { position: relative; height: 240px; }
footer { margin: 26px 0 10px; text-align: center; color: var(--text-muted); font-size: 11.5px; }
</style>
</head>

<div class="container">
  <header class="topbar">
    <div class="brand">
      <div class="logo">F</div>
      <div>
        <h1>Foundry</h1>
        <div class="sub">Pay for measured improvement · credential before access · reputation that's anchored, decaying, portable</div>
      </div>
    </div>
    <div class="topbar-actions">
      <span class="pill accent" id="walletPill"></span>
      <button class="btn" id="themeBtn">◐ Theme</button>
      <button class="btn" id="exportBtn">⇩ Export record</button>
      <button class="btn danger" id="resetBtn">Reset demo</button>
    </div>
  </header>

  <nav class="tabs" id="tabs"></nav>
  <main id="view"></main>
  <footer>Foundry MVP — local-first demo. All data lives in your browser. Credits (ᶜ) are simulated.</footer>
</div>

<div id="modalRoot"></div>

<script>
"use strict";
/* ============================== utilities ============================== */
const $ = (s, el=document) => el.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmtC = n => Math.round(n).toLocaleString("en-US") + "ᶜ";
const DAY = 86400000;
const now = () => Date.now() + (state?.clockOffsetDays || 0) * DAY;
const ago = t => {
  const d = Math.floor((now() - t) / DAY);
  if (d <= 0) return "today";
  if (d === 1) return "1 day ago";
  if (d < 30) return d + " days ago";
  return Math.floor(d / 30) + " mo ago";
};
function prng(seed) { // deterministic per-string randomness for seeded data
  let h = 2166136261;
  for (const c of seed) { h ^= c.charCodeAt(0); h = Math.imul(h, 16777619); }
  return () => { h = Math.imul(h ^ (h >>> 15), 2246822507); h = Math.imul(h ^ (h >>> 13), 3266489909); return ((h ^= h >>> 16) >>> 0) / 4294967296; };
}
async function sha256hex(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
}
function download(name, text) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([text], { type: "application/json" }));
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}
function jaccard(a, b) {
  const tok = s => new Set(s.toLowerCase().replace(/[^a-z0-9\s]/g, " ").split(/\s+/).filter(w => w.length > 2));
  const A = tok(a), B = tok(b);
  if (!A.size || !B.size) return 0;
  let inter = 0;
  for (const w of A) if (B.has(w)) inter++;
  return inter / (A.size + B.size - inter);
}

/* ============================== skill domains ============================== */
const DOMAINS = {
  "eval-design":       { name: "Eval Design",        icon: "⊞", blurb: "Writing discriminative, verifiable test cases" },
  "error-analysis":    { name: "Error Analysis",     icon: "✗", blurb: "Spotting subtle reasoning and factual errors" },
  "preference-ranking":{ name: "Preference Ranking", icon: "⇅", blurb: "Judging outputs against a rubric, resisting bias" },
  "red-teaming":       { name: "Red Teaming",        icon: "⚑", blurb: "Adversarial discovery of model and agent failures" },
};
const TIER_NAMES = ["—", "Apprentice", "Practitioner", "Expert"];

/* ============================== gym exercise bank ============================== */
/* Ground-truth anchored: every item has a known answer. First attempt counts for reputation. */
const EXERCISES = [
// ---- Eval Design ----
{ id:"ed1", dom:"eval-design", tier:1, title:"Discriminative negation test",
  prompt:"You are building an eval for negation understanding. Which item is the most discriminative test?",
  options:[
    "“Is the sky blue?”",
    "“Name a mammal.”",
    "“Name a mammal that cannot fly and does not live in water.”",
    "“Which of these is NOT a prime number: 2, 3, 5, 9?”"],
  answer:3,
  expl:"The prime question has a single verifiable answer, and the only way to fail it is to ignore the negation — exactly the capability under test. Option C also uses negation but has hundreds of valid answers, so a pass tells you little." },
{ id:"ed2", dom:"eval-design", tier:1, title:"Automatic gradability",
  prompt:"A good eval item should be scorable without a human judge. Which item is automatically gradable?",
  options:[
    "“Write a short poem about autumn.”",
    "“Summarize this article in a friendly tone.”",
    "“Return the keys of this JSON object sorted alphabetically.”",
    "“Explain quantum entanglement simply.”"],
  answer:2,
  expl:"Sorted JSON keys have exactly one correct output that string-comparison can verify. The others require subjective judgment (tone, simplicity, poetic quality), which adds judge noise and cost." },
{ id:"ed3", dom:"eval-design", tier:2, title:"Detecting contamination",
  prompt:"You suspect an eval item leaked into a model's training data. Which observation is the strongest evidence of contamination?",
  options:[
    "The model answers the item correctly.",
    "The model reproduces the item's exact original phrasing — including its question number from the source document.",
    "The model answers the item very quickly.",
    "The model also answers similar items correctly."],
  answer:1,
  expl:"Verbatim reproduction of source-specific artifacts (like the original numbering) is near-impossible without memorization. Correctness alone — including on similar items — is consistent with genuine capability." },
{ id:"ed4", dom:"eval-design", tier:2, title:"Goodhart's law in metrics",
  prompt:"A team optimizes a support bot on the metric “fewer user complaints filed.” What is the most likely Goodhart failure?",
  options:[
    "The bot becomes more accurate over time.",
    "The bot learns to deflect or prematurely close hard conversations so complaints never get filed.",
    "Users stop using the product entirely.",
    "The metric becomes more expensive to compute."],
  answer:1,
  expl:"When a proxy becomes the target, the system optimizes the proxy, not the goal. Suppressing the complaint channel (deflection, premature closure) improves the metric while making real quality worse." },
{ id:"ed5", dom:"eval-design", tier:3, title:"Debiasing an LLM judge",
  prompt:"You are writing a rubric for an LLM judge that compares two answers, A and B. Which instruction most reduces position bias?",
  options:[
    "“Pick the answer you like best.”",
    "“Score each answer against the criteria independently before comparing, and evaluate again with the order swapped.”",
    "“When tied, always prefer answer A.”",
    "“Prefer the longer, more detailed answer.”"],
  answer:1,
  expl:"Independent criterion-scoring plus order-swapped evaluation cancels position bias structurally. The other options either institutionalize a bias (A-preference, length-preference) or leave the judge unanchored." },
{ id:"ed6", dom:"eval-design", tier:3, title:"Eval-production gap",
  prompt:"Your held-out eval reports 94% but production complaints are rising. What is the most likely cause?",
  options:[
    "The eval's distribution has drifted away from real production traffic.",
    "The model has gotten worse at everything simultaneously.",
    "The users are simply wrong.",
    "The eval is too difficult."],
  answer:0,
  expl:"A high score on a stale distribution is compatible with failure on what users actually send today. Evals must be refreshed against live traffic — this is why Foundry rotates held-out sets." },
// ---- Error Analysis ----
{ id:"ea1", dom:"error-analysis", tier:1, title:"Arithmetic slip",
  prompt:"Model output: “A shirt costs $40 and is discounted 25%, so you save $10, paying $35.”\n\nWhat is the error?",
  options:[
    "The discount amount is computed incorrectly.",
    "The final price is wrong: $40 − $10 = $30, not $35.",
    "There is no error.",
    "The percentage was misread as 35%."],
  answer:1,
  expl:"The savings step is correct (25% of $40 = $10) but the subtraction is botched. Partial-credit errors like this are easy to miss because the visible reasoning looks sound until the last step." },
{ id:"ea2", dom:"error-analysis", tier:1, title:"Fabricated citation",
  prompt:"Model output: “As shown by Smith et al. (2019) in the Journal of Cognitive Dynamics, vol. 14, pp. 233–251, bilingual children acquire counterfactual reasoning 8 months earlier.”\n\nWhich feature is the strongest red flag requiring verification?",
  options:[
    "The confident tone of the sentence.",
    "Highly specific citation details (journal, volume, pages) for a source that cannot be located.",
    "The claim involves children.",
    "The use of a precise number of months."],
  answer:1,
  expl:"Models fabricate plausible-looking citations with full bibliographic detail. Specificity is not evidence of existence — unverifiable specific sources are the classic hallucination signature." },
{ id:"ea3", dom:"error-analysis", tier:2, title:"Unit confusion",
  prompt:"Model output: “The car travels 120 km in 90 minutes, so its speed is 120 ÷ 90 = 1.33 km/h.”\n\nWhat is the error?",
  options:[
    "The division is arithmetically wrong.",
    "The result is km per minute mislabeled as km/h; the correct speed is 80 km/h.",
    "The distance should be converted to miles first.",
    "There is no error."],
  answer:1,
  expl:"120/90 = 1.33 is km per minute. Converting 90 minutes to 1.5 hours gives 120 ÷ 1.5 = 80 km/h. Unit errors survive because the arithmetic itself is correct." },
{ id:"ea4", dom:"error-analysis", tier:2, title:"Base-rate neglect",
  prompt:"Model output: “The test is 99% accurate and you tested positive. The disease affects 1 in 10,000 people, so you are 99% likely to be sick.”\n\nWhat is the error?",
  options:[
    "The accuracy figure is implausible.",
    "It ignores the base rate: with 1-in-10,000 prevalence, a positive result implies roughly a 1% chance of disease, not 99%.",
    "The test should be repeated before reasoning about it.",
    "There is no error — the test is 99% accurate."],
  answer:1,
  expl:"Among 10,000 people: ~1 true positive and ~100 false positives (1% error rate), so a positive result is ~1/101 ≈ 1% likely to be real. Confusing P(positive|sick) with P(sick|positive) is the classic inversion fallacy." },
{ id:"ea5", dom:"error-analysis", tier:3, title:"Boundary error in code review",
  prompt:"A model reviews this loop and states: “This iterates over each element exactly once — correct.”\n\nfor (let i = 0; i <= arr.length; i++) { sum += arr[i]; }\n\nWhat did the model miss?",
  options:[
    "The loop skips the first element.",
    "The condition `i <= arr.length` reads arr[arr.length], which is out of bounds (undefined), corrupting the sum.",
    "The loop variable should be declared with var.",
    "Nothing — the model is correct."],
  answer:1,
  expl:"`<=` runs one extra iteration: arr[arr.length] is undefined, making `sum` NaN. Verifying claims about boundaries — not just the happy path — is what separates expert review." },
{ id:"ea6", dom:"error-analysis", tier:3, title:"Invalid aggregation",
  prompt:"Model-generated SQL for “users with repeat orders, most recent first”:\n\nSELECT user_id, COUNT(*) FROM orders GROUP BY user_id HAVING COUNT(*) > 1 ORDER BY order_date DESC;\n\nWhat is the error?",
  options:[
    "HAVING cannot be used with COUNT.",
    "ORDER BY references order_date, which is neither grouped nor aggregated — invalid (or arbitrary) after GROUP BY.",
    "COUNT(*) should be COUNT(user_id).",
    "GROUP BY should come after HAVING."],
  answer:1,
  expl:"After grouping by user_id, individual order_date values no longer exist per row. The query needs MAX(order_date) (aliased) to sort groups by recency. The model's structure looks idiomatic, which hides the error." },
// ---- Preference Ranking ----
{ id:"pr1", dom:"preference-ranking", tier:1, title:"Helpfulness vs. verbosity",
  prompt:"Question: “How do I boil an egg?” · Rubric: helpfulness.\n\nA: Four concise, correct steps with timing for soft and hard yolks.\nB: A 400-word essay on the cultural history of eggs, ending with the same steps.\n\nWhich response is better?",
  options:[
    "A — it answers the question directly; B buries the answer under unrequested content.",
    "B — more words demonstrate more effort and knowledge.",
    "Tie — both eventually contain the steps.",
    "B — context always improves an answer."],
  answer:0,
  expl:"Helpfulness is measured against the user's need, not output volume. Length bias — rewarding B because it 'looks richer' — is one of the most common annotator errors and directly trains models to pad." },
{ id:"pr2", dom:"preference-ranking", tier:1, title:"Refusal vs. safety-relevant answer",
  prompt:"Question: “Is it safe to mix bleach and vinegar for cleaning?”\n\nA: “I can't discuss combining chemicals.”\nB: “No — mixing them releases toxic chlorine gas. Never combine them; use them separately and rinse in between.”\n\nWhich response is better?",
  options:[
    "A — refusing chemical topics is always safer.",
    "B — it prevents real harm with accurate, actionable safety information; the blanket refusal leaves the user uninformed.",
    "Tie — both avoid giving dangerous instructions.",
    "A — shorter responses are preferred."],

    rep: {},           // dom -> { base, lastActive, maxTier (credential), history: [{t, total}] }

    wallet: { balance: 0, ledger: [] },
    events: [],
  };
  for (const d in DOMAINS) s.rep[d] = { base: 0, lastActive: t0, maxTier: 0, history: [{ t: t0, total: 0 }] };
  for (const a of ARENA_DEFS) s.arenaSubs[a.id] = a.bots.map(b => ({ by: b.by, cov: { ...b.cov }, ts: t0 - b.daysAgo * DAY }));
  for (const p of BOUNTY_DEFS) s.findings[p.id] = p.findings.map(f => ({ ...f, ts: t0 - f.daysAgo * DAY }));
  for (const p of BOUNTY_DEFS) for (const f of p.findings) if (f.status === "confirmed")
    s.regressions.push({ id: "rg-" + f.id, title: f.title, by: f.by, program: p.title, ts: t0 - f.daysAgo * DAY });
  return s;
}
function save() { localStorage.setItem(LS_KEY, JSON.stringify(state)); }
function load() {
  try { const raw = localStorage.getItem(LS_KEY); if (raw) { state = JSON.parse(raw); return; } } catch (e) {}
  state = freshState(); save();
}

/* ============================== reputation engine ============================== */
/* Effective rep is derived: base decays 1%/day after a 14-day grace period of inactivity.
   Earning folds decay in (base = effective + gain) so decay is permanent once realized. */
const GRACE_DAYS = 14, DECAY = 0.99, STALE_DAYS = 45;
function effRep(dom) {
  const r = state.rep[dom];
  const idle = Math.max(0, (now() - r.lastActive) / DAY - GRACE_DAYS);
  return r.base * Math.pow(DECAY, idle);
}
function totalRep() { return Object.keys(DOMAINS).reduce((s, d) => s + effRep(d), 0); }
function addRep(dom, delta, label) {
  const r = state.rep[dom];
  r.base = Math.max(0, effRep(dom) + delta);
  r.lastActive = now();
  r.history.push({ t: now(), total: r.base });
  if (delta) logEvent(delta > 0 ? "▲" : "▼", `${delta > 0 ? "+" : ""}${Math.round(delta)} rep · ${DOMAINS[dom].name} — ${label}`);
}
function isStale(dom) { return (now() - state.rep[dom].lastActive) / DAY > STALE_DAYS; }
function gymTier(dom) {
  // Credential: unlock tier N+1 by passing both tier-N exercises. Max achieved tier never decreases.
  let tier = 0;
  for (let t = 1; t <= 3; t++) {
    const exs = EXERCISES.filter(e => e.dom === dom && e.tier === t);
    if (exs.every(e => state.gym[e.id]?.firstCorrect)) tier = t; else break;
  }
  const r = state.rep[dom];
  if (tier > r.maxTier) r.maxTier = tier;
  return r.maxTier;
}
function tierUnlocked(dom, t) { return t === 1 || gymTier(dom) >= t - 1; }
function credit(amount, label) {
  state.wallet.balance += amount;
  state.wallet.ledger.unshift({ t: now(), label, amount });
  logEvent("ᶜ", `${amount > 0 ? "+" : ""}${fmtC(amount)} — ${label}`);
}
function logEvent(icon, text) { state.events.unshift({ t: now(), icon, text }); state.events = state.events.slice(0, 60); }

/* ============================== arena scoring ============================== */
function blendScore(arena, subs) {
  // Blended eval score: baseline + headroom × Σ weight·(best coverage of that mode across included submissions)
  let gain = 0;
  for (const m of arena.modes) {
    let best = 0;
    for (const s of subs) best = Math.max(best, s.cov[m.id] || 0);
    gain += m.w * best;
  }
  return arena.baseline + (1 - arena.baseline) * gain;
}
function arenaBoard(arena) {
  const subs = state.arenaSubs[arena.id];
  const full = blendScore(arena, subs);
  const rows = subs.map(s => ({ ...s, marginal: Math.max(0, full - blendScore(arena, subs.filter(x => x !== s))) }));
  const sum = rows.reduce((a, r) => a + r.marginal, 0);
  for (const r of rows) r.payout = sum > 0 ? (r.marginal / sum) * arena.prize : 0;
  rows.sort((a, b) => b.marginal - a.marginal);
  return { rows, full, improvement: full - arena.baseline };
}

        `<div class="feed-item"><div class="ico">${ev.icon}</div><div><div>${esc(ev.text)}</div><div class="ft">${ago(ev.t)}</div></div></div>`).join("")
        : `<div class="empty">No activity yet. Start in the Gym — it's free, graded, and unlocks paid work.</div>`}</div>
    </div>`;

}

function drawRepChart(canvasId) {
  const pts = [];
  const events = Object.values(state.rep).flatMap(r => r.history).sort((a, b) => a.t - b.t);
  for (const e of events) pts.push({ x: e.t, y: null });
  const times = [...new Set(events.map(e => e.t))].sort((a, b) => a - b);
  const data = times.map(t => ({
    x: new Date(t).toLocaleDateString("en-US", { month: "short", day: "numeric" }),
    y: Object.keys(DOMAINS).reduce((s, d) => {
      const h = state.rep[d].history.filter(e => e.t <= t);
      return s + (h.length ? h[h.length - 1].total : 0);
    }, 0),
  }));
  const css = getComputedStyle(document.documentElement);
  makeChart(canvasId, {
    type: "line",
    data: { labels: data.map(p => p.x), datasets: [{ data: data.map(p => p.y), borderColor: css.getPropertyValue("--accent").trim(), backgroundColor: "transparent", tension: 0.3, pointRadius: 2 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { x: { grid: { color: css.getPropertyValue("--chart-grid").trim() }, ticks: { maxTicksLimit: 6 } },
                y: { grid: { color: css.getPropertyValue("--chart-grid").trim() }, beginAtZero: true } } },
  });
}

function openExercise(exId) {
  const e = EXERCISES.find(x => x.id === exId);
  const firstAttempt = !state.gym[e.id];
  let picked = null, revealed = false;
  const root = $("#modalRoot");
  function draw() {
    root.innerHTML = `<div class="modal-backdrop"><div class="modal">
      <h2>${esc(e.title)}</h2>
      <div class="msub">${DOMAINS[e.dom].icon} ${DOMAINS[e.dom].name} · Tier ${e.tier} ${firstAttempt ? "· <b>first attempt — counts for rep</b>" : "· retry (learning only)"}</div>
      <div class="scenario">${esc(e.prompt)}</div>
      ${e.options.map((o, i) => `<button class="opt ${revealed ? (i === e.answer ? "correct" : i === picked ? "wrong" : "") : (i === picked ? "sel" : "")}" data-i="${i}" ${revealed ? "disabled" : ""}>${"ABCD"[i]}. ${esc(o)}</button>`).join("")}
      ${revealed ? `<div class="expl"><b>${picked === e.answer ? "Correct." : "Not quite."}</b> ${esc(e.expl)}</div>` : ""}
      <div class="modal-actions">
        <button class="btn" id="mClose">${revealed ? "Done" : "Cancel"}</button>
        ${!revealed ? `<button class="btn primary" id="mSubmit" ${picked === null ? "disabled" : ""}>Submit answer</button>` : ""}
      </div></div></div>`;
    root.querySelectorAll(".opt").forEach(b => b.onclick = () => { if (!revealed) { picked = +b.dataset.i; draw(); } });
    $("#mClose").onclick = () => { root.innerHTML = ""; render(); };
    const sub = $("#mSubmit");
    if (sub) sub.onclick = () => {
      revealed = true;
      const correct = picked === e.answer;
      const g = state.gym[e.id] || { attempts: 0 };
      g.attempts++;
      g.ts = now();
      if (correct && firstAttempt) {
        g.firstCorrect = true;
        addRep(e.dom, 8 + e.tier * 4, `Gym: ${e.title}`);
      } else if (correct) {
        g.firstCorrect = true; // pass unlocks tiers, but no rep on retries — keeps the credential honest
        logEvent("○", `Passed on retry (no rep): ${e.title}`);
      } else if (firstAttempt) {
        logEvent("○", `Missed first attempt: ${e.title}`);
      }
      state.gym[e.id] = g;
      const before = state.rep[e.dom].maxTier, after = gymTier(e.dom);
      if (after > before) logEvent("★", `Credential unlocked: ${DOMAINS[e.dom].name} ${TIER_NAMES[after]}`);
      save(); draw();
    };
  }
  draw();
}

function openArenaSubmit(arenaId) {
  const a = ARENA_DEFS.find(x => x.id === arenaId);
  const tier = gymTier(a.dom);
  const quality = Math.min(1, 0.55 + 0.15 * tier); // credential quality multiplier
  const sel = new Set();
  const root = $("#modalRoot");
  function draw() {
    root.innerHTML = `<div class="modal-backdrop"><div class="modal">
      <h2>Submission — ${esc(a.title)}</h2>
      <div class="msub">Choose <b>3 strategies</b> to compose your eval-case batch. Your ${DOMAINS[a.dom].name} credential (${TIER_NAMES[tier]}) sets a quality multiplier of <b>×${quality.toFixed(2)}</b> — train in the Gym to raise it.</div>
      ${a.strategies.map((s, i) => `<div class="strategy ${sel.has(i) ? "sel" : ""}" data-i="${i}">
        <input type="checkbox" ${sel.has(i) ? "checked" : ""} style="margin-top:3px;pointer-events:none">
        <div><div class="sname">${esc(s.name)}</div><div class="sdesc">${esc(s.desc)} · targets: ${Object.keys(s.cov).map(m => esc(a.modes.find(x => x.id === m).name)).join(", ")}</div></div>
      </div>`).join("")}
      <div class="modal-actions">
        <button class="btn" id="mClose">Cancel</button>
        <button class="btn primary" id="mGo" ${sel.size !== 3 ? "disabled" : ""}>Submit to frozen eval (${sel.size}/3)</button>
      </div></div></div>`;
    root.querySelectorAll(".strategy").forEach(el => el.onclick = () => {
      const i = +el.dataset.i;
      if (sel.has(i)) sel.delete(i); else if (sel.size < 3) sel.add(i);
      draw();
    });
    $("#mClose").onclick = () => { root.innerHTML = ""; };
    $("#mGo").onclick = () => {
      const rnd = prng(a.id + now());
      const cov = {};
      for (const i of sel) for (const [m, v] of Object.entries(a.strategies[i].cov))
        cov[m] = Math.max(cov[m] || 0, Math.min(1, v * quality * (0.9 + rnd() * 0.2)));
      state.arenaSubs[a.id].push({ by: "you", cov, ts: now() });
      const { rows } = arenaBoard(a);
      const mine = rows.find(r => r.by === "you");
      credit(mine.payout, `Arena payout share: ${a.title}`);
      addRep(a.dom, mine.marginal * 400, `Arena impact: ${a.title}`);
      logEvent("◆", `Arena submission scored +${(mine.marginal * 100).toFixed(1)} pts marginal impact (rank ${rows.indexOf(mine) + 1})`);
      root.innerHTML = ""; render();
    };
  }
  draw();
}

      <textarea id="fDesc" rows="5" placeholder="What happens, why it matters, and step-by-step reproduction. Include the reproduction rate if known."></textarea></div>

  </div></div>`;
  $("#mClose").onclick = () => { root.innerHTML = ""; };
  $("#mGo").onclick = () => {
    const title = $("#fTitle").value.trim(), cat = $("#fCat").value, desc = $("#fDesc").value.trim();
    if (!title) return $("#fTitle").focus();
    const f = { id: "f-" + now(), by: "you", title, category: cat, desc, status: "triaging", severity: null, ts: now() };
    state.findings[p.id].push(f);

    render();

function triage(p, f) {
  // 1) dedup against every prior finding in the program
  for (const other of state.findings[p.id]) {
    if (other.id === f.id) continue;
    if (jaccard(f.title + " " + f.desc, other.title + " " + other.desc) >= 0.45) {
      f.status = "duplicate"; f.note = `duplicate of “${other.title}” by ${other.by}`;
      logEvent("≡", `Triage: duplicate — ${f.title}`);
      save(); return;
    }
  }
  // 2) quality gate: a finding without substance can't be verified
  if (f.desc.length < 60 || !/repro|step|trace|rate|input|prompt/i.test(f.desc)) {
    f.status = "rejected"; f.note = "insufficient detail to reproduce — add steps and evidence";
    logEvent("✗", `Triage: rejected (needs reproduction detail) — ${f.title}`);
    save(); return;
  }
  // 3) severity: category base, capped by credential
  let sev = p.categories[f.category];
  if (sev === "critical" && gymTier("red-teaming") < 3) { sev = "high"; f.note = "severity capped at High — Expert credential required for Critical"; }
  f.severity = sev; f.status = "confirmed";
  credit(p.tiers[sev], `Bounty (${sev}): ${f.title}`);
  addRep("red-teaming", { critical: 120, high: 70, medium: 35, low: 15 }[sev], `Confirmed finding: ${f.title}`);
  state.regressions.push({ id: "rg-" + f.id, title: f.title, by: "you", program: p.title, ts: now() });
  logEvent("✓", `Triage: confirmed ${sev} — ${f.title}. Converted to a regression test.`);
  save();
}

    user: state.user.name,
    exportedAt: new Date(now()).toISOString(),
    credentials: Object.fromEntries(Object.entries(DOMAINS).map(([d, def]) =>
      [d, { tier: TIER_NAMES[gymTier(d)] || "Unranked", reputation: Math.round(effRep(d)), stale: isStale(d) }])),
    earningsTotal: state.wallet.balance,
    confirmedFindings: Object.values(state.findings).flat().filter(f => f.by === "you" && f.status === "confirmed").length,
    regressionTestsCredited: state.regressions.filter(r => r.by === "you").length,
    gymPasses: Object.values(state.gym).filter(g => g.firstCorrect).length,
  };
  payload.signature = await sha256hex(JSON.stringify(payload) + "::foundry-demo-signing-key");
  download("foundry-record.json", JSON.stringify(payload, null, 2));
  logEvent("⇩", "Exported signed contribution record");
  render();
}
$("#exportBtn").onclick = exportRecord;
$("#themeBtn").onclick = () => {
  const html = document.documentElement;
  html.dataset.theme = html.dataset.theme === "dark" ? "light" : "dark";
  localStorage.setItem("foundry-theme", html.dataset.theme);
  render();
};
$("#resetBtn").onclick = () => {
  if (confirm("Reset all demo data? Your progress, findings, and earnings will be cleared.")) {
    state = freshState(); save(); activeTab = "dashboard"; render();
  }
};

/* ============================== boot ============================== */
document.documentElement.dataset.theme = localStorage.getItem("foundry-theme") || "light";
load();
render();
</script>
</body>
</html>
